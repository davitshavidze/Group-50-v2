<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        gap: 20px;
        font-family: sans-serif;
      }

      #par {
        display: flex;
        gap: 20px;
      }

      #child {
        background-color: gray;
        padding: 10px;
        color: white;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      #child button {
        border: none;
        padding: 3px;
        border-radius: 7px;
        transition: 0.3s ease;
      }

      #child button:hover {
        cursor: pointer;
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to shop catalog!</h1>
    <div id="par">
      {% for x in prods %}
        <div id="child">
          <h3>{{x.title}}</h3>
          <h4>{{x.desc}}</h4>
          <a href="details/{{ x.id }}"><button>View full Product</button></a>
        </div>
      {% endfor %}
    </div>
  </body>
</html>
